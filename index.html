<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>轨迹地图</title>
<meta name="theme-color" content="#141009">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@600;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
:root{--bg:#141009;--surface:#1e1812;--border:rgba(180,150,110,.08);--border-strong:rgba(180,150,110,.14);--text:#e8dfd2;--text-2:#a89880;--text-3:#7a6b58;--gold:#d4a44c;--gold-border:#c4963e;--rose:#b85a4a;--green:#5a8a6a}
body{font-family:"Urbanist","Noto Sans SC","PingFang SC",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}
body::after{content:"";position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.55' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");pointer-events:none;z-index:0}
::selection{background:rgba(212,164,76,.3)}
.app-loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity .6s ease}
.app-loading.hide{opacity:0;pointer-events:none}
.loader{width:24px;height:24px;border-radius:50%;border:2px solid var(--border-strong);border-top-color:var(--gold);animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.container{position:relative;z-index:1;width:100%;max-width:960px;padding:40px 24px}
.header{text-align:center;margin-bottom:48px}
.header h1{font-family:"Noto Serif SC",serif;font-size:38px;font-weight:900;color:#dcc8a8;letter-spacing:2px;margin-bottom:8px}
.header .sub{font-size:14px;color:var(--text-3);letter-spacing:4px;font-weight:400}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px 24px;cursor:pointer;transition:all .4s;text-decoration:none;display:block;position:relative;overflow:hidden}
.card:hover{border-color:var(--border-strong);transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,.25)}
.card:hover .card-arrow{opacity:1;transform:translateX(0)}
.card-icon{font-size:36px;margin-bottom:16px;display:block}
.card h2{font-family:"Noto Serif SC",serif;font-size:20px;font-weight:700;color:#dcc8a8;margin-bottom:6px}
.card p{font-size:13px;color:var(--text-3);line-height:1.5}
.card-arrow{position:absolute;right:20px;bottom:20px;font-size:18px;color:var(--gold);opacity:0;transform:translateX(-8px);transition:all .4s}
.card.accent-gold{border-top:2px solid var(--gold)}
.card.accent-rose{border-top:2px solid var(--rose)}
.card.accent-green{border-top:2px solid var(--green)}
@media(max-width:640px){.header h1{font-size:26px}.cards{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app-loading" id="loading"><div class="loader"></div></div>
<div class="container">
<div class="header">
<h1>轨迹地图</h1>
<div class="sub">LIFE JOURNEY MAP</div>
</div>
<div class="cards">
<a href="travel-route.html" class="card accent-gold">
<span class="card-icon">🗺️</span>
<h2>旅游路线</h2>
<p>精选城市旅游攻略，站到站导航，细粒度行程规划。</p>
<span class="card-arrow">→</span>
</a>
<a href="custom-journey.html" class="card accent-rose">
<span class="card-icon">✨</span>
<h2>自定义历程</h2>
<p>创建你自己的旅程轨迹，导入/导出 JSON 数据。</p>
<span class="card-arrow">→</span>
</a>
<a href="history-gallery.html" class="card accent-green">
<span class="card-icon">📜</span>
<h2>历史长廊</h2>
<p>历史人物轨迹播放，感受时间与空间的交错。</p>
<span class="card-arrow">→</span>
</a>
</div>
</div>
<script>setTimeout(function(){document.getElementById("loading").classList.add("hide")},300)</script>
</body>
</html>
