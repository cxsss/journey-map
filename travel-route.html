<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旅游路线 · 轨迹地图</title>
<meta name="theme-color" content="#0a0a12">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
:root{--bg:#141009;--surface:#1e1812;--surface-2:#261f17;--border:rgba(180,150,110,.08);--border-strong:rgba(180,150,110,.14);--text:#e8dfd2;--text-2:#a89880;--text-3:#7a6b58;--gold:#d4a44c;--gold-soft:rgba(212,164,76,.12);--gold-border:#c4963e;--charcoal:#3a3226;--amber:#e0b84c}
body{font-family:"Urbanist","Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh;overflow:hidden}
body::after{content:"";position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.55' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");pointer-events:none;z-index:0}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{border-radius:4px;background:var(--text-3);min-width:40px;min-height:40px}
.app-loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity .6s ease}
.app-loading.hide{opacity:0;pointer-events:none}
.loader{width:24px;height:24px;border-radius:50%;border:2px solid var(--border-strong);border-top-color:var(--gold);animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.topbar{display:flex;align-items:center;padding:12px 24px;gap:8px;background:rgba(20,16,9,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;z-index:10;position:relative}
.topbar::-webkit-scrollbar{height:0}
.chip{display:flex;align-items:center;gap:8px;padding:8px 16px;border-radius:20px;cursor:pointer;border:1px solid transparent;white-space:nowrap;transition:all .4s;font-size:14px;font-weight:400;color:var(--text-2);flex-shrink:0}
.chip:hover{border-color:var(--border-strong);color:var(--text)}
.chip.active{background:var(--gold-soft);border-color:rgba(212,164,76,.2);color:var(--gold)}
.chip .dot{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.main{display:flex;flex:1;overflow:hidden;position:relative}
.sidebar{width:350px;min-width:350px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:5}
.sidebar-head{padding:16px 20px 12px;border-bottom:1px solid var(--border)}
.sidebar-head .kicker{font-size:10px;font-weight:600;letter-spacing:3px;color:var(--text-3);text-transform:uppercase;margin-bottom:2px}
.sidebar-head h2{font-family:"Noto Serif SC",serif;font-size:17px;font-weight:700;color:#dcc8a8}
.sidebar-head .info{font-size:11px;color:var(--text-3);margin-top:4px;line-height:1.4}
.itinerary{flex:1;overflow-y:auto;padding:8px 12px 12px 18px;scroll-behavior:smooth}
.stop-item{position:relative;padding:12px 0 12px 28px;cursor:pointer;border-radius:8px;margin:1px 0;transition:all .4s}
.stop-item:hover{background:rgba(180,150,110,.03)}
.stop-item.active{background:var(--gold-soft)}
.stop-item::before{content:"";position:absolute;left:8px;top:0;bottom:0;width:1px;background:var(--border)}
.stop-item:first-child::before{top:20px}
.stop-item:last-child::before{bottom:calc(100% - 20px)}
.stop-item::after{content:"";position:absolute;left:2px;top:18px;width:13px;height:13px;border-radius:50%;background:var(--bg);border:2px solid var(--border-strong);transition:all .4s;z-index:1}
.stop-item.active::after{background:var(--gold);border-color:var(--gold);box-shadow:0 0 12px rgba(212,164,76,.45);transform:scale(1.25)}
.stop-num{position:absolute;left:0;top:14px;font-size:8px;font-weight:700;color:var(--text-3);width:16px;text-align:center;z-index:2;background:var(--surface);line-height:16px;border-radius:50%}
.stop-item.active .stop-num{color:var(--bg);background:transparent}
.stop-date{font-size:10px;font-weight:500;color:var(--text-3);margin-bottom:2px;padding-left:2px}
.stop-title{font-size:13px;font-weight:500;line-height:1.4}
.stop-loc{font-size:11px;color:var(--text-2);margin-top:2px}
.stop-tip{font-size:10px;color:var(--amber);margin-top:4px;padding:4px 8px;border-radius:8px;background:rgba(224,184,76,.06);display:inline-block}
.stop-desc{font-size:11px;color:var(--text-3);margin-top:4px;line-height:1.4}
.map-area{flex:1;position:relative}
.landmark-banner{position:absolute;top:0;left:0;right:0;height:180px;z-index:3;overflow:hidden;background:var(--surface-2);border-bottom:1px solid var(--border);transition:height .5s cubic-bezier(.4,0,.2,1),opacity .4s}
.landmark-banner img{width:100%;height:100%;object-fit:cover;transition:opacity .6s ease,transform .8s ease}
.landmark-banner img.loading{opacity:0;transform:scale(1.03)}
.landmark-banner .landmark-shade{position:absolute;inset:0;background:linear-gradient(to top,rgba(20,16,9,.7) 0%,rgba(20,16,9,.2) 50%,rgba(20,16,9,.1) 100%);pointer-events:none}
.landmark-banner .landmark-label{position:absolute;bottom:12px;left:16px;font-family:"Noto Serif SC",serif;font-size:20px;font-weight:700;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.5);pointer-events:none;transition:all .5s}
.landmark-banner .landmark-spinner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:20px;height:20px;border-radius:50%;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;animation:spin .6s linear infinite;opacity:0;transition:opacity .3s}
.landmark-banner .landmark-spinner.show{opacity:1}
#map{margin-top:180px;height:calc(100% - 180px);width:100%;background:var(--bg)}
.map-overlay{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);z-index:5;display:flex;align-items:center;gap:10px;background:rgba(20,16,9,.88);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:6px 14px;border-radius:22px;border:1px solid var(--border);pointer-events:auto}
.map-ctrl{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);cursor:pointer;background:rgba(255,255,255,.03);display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .35s;color:var(--text-2)}
.map-ctrl:hover{border-color:var(--border-strong);color:var(--text)}
.map-ctrl.playing{background:var(--gold-soft);border-color:rgba(212,164,76,.3);color:var(--gold)}
.map-ctrl:disabled{opacity:.3;cursor:default}
.map-info{font-size:11px;color:var(--text-2);font-weight:400;min-width:80px;text-align:center}
.map-top{position:absolute;top:196px;left:16px;z-index:5;display:flex;gap:6px;flex-wrap:wrap}
.layer-ctrl{display:flex;gap:4px;background:rgba(20,16,9,.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:4px;border-radius:20px;border:1px solid var(--border)}
.layer-btn{width:32px;height:32px;border-radius:50%;border:1px solid transparent;background:rgba(255,255,255,.03);cursor:pointer;font-size:14px;transition:all .35s;display:flex;align-items:center;justify-content:center;padding:0;position:relative}
.layer-btn:hover{border-color:var(--border-strong)}
.layer-btn.active{background:var(--gold-soft);border-color:rgba(212,164,76,.2)}
.layer-btn .tip{position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%) translateY(2px);font-size:9px;white-space:nowrap;color:var(--text-2);opacity:0;pointer-events:none;transition:all .3s;font-family:inherit;font-weight:400}
.layer-btn:hover .tip{opacity:1;transform:translateX(-50%) translateY(0)}
.toast{position:absolute;bottom:90px;left:50%;transform:translateX(-50%) translateY(8px);z-index:6;font-size:15px;font-weight:600;background:rgba(20,16,9,.92);border:1px solid rgba(212,164,76,.2);padding:8px 18px;border-radius:18px;pointer-events:none;opacity:0;transition:all .5s;color:var(--gold)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.route-marker{background:transparent!important;border:none!important}
.route-marker .marker-body{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid var(--gold-border);box-shadow:0 0 10px rgba(212,175,55,.12),0 2px 8px rgba(0,0,0,.35);transition:all .3s;position:relative}
.route-marker .marker-body.active{width:38px;height:38px;font-size:14px;border-color:var(--amber);box-shadow:0 0 20px rgba(240,192,64,.3),0 3px 12px rgba(0,0,0,.45)}
.journey-line{stroke-dasharray:6 8;animation:dashflow 1s linear infinite}
@keyframes dashflow{to{stroke-dashoffset:-14}}
.journey-line-curve{stroke-dasharray:4 6;animation:dashflow 1.5s linear infinite;pointer-events:none}
.custom-popup .leaflet-popup-content-wrapper{background:rgba(30,24,18,.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--border-strong);border-radius:10px;color:var(--text);box-shadow:0 8px 32px rgba(0,0,0,.35);padding:0}
.custom-popup .leaflet-popup-content{margin:12px 16px;font-family:inherit;font-size:13px;line-height:1.5}
.custom-popup .leaflet-popup-tip{display:none}
.custom-popup .leaflet-popup-close-button{color:var(--text-3)!important;font-size:18px!important;font-weight:300;top:6px!important;right:10px!important}
.popup-title{font-weight:600;font-size:13px;margin-bottom:4px}
.popup-meta{font-size:10px;color:var(--text-3);margin-bottom:6px}
.popup-desc{font-size:11px;color:var(--text-2)}
.btn-back{position:absolute;top:196px;right:16px;z-index:5;padding:7px 14px;border-radius:16px;border:1px solid var(--border);background:rgba(20,16,9,.85);color:var(--text-2);font-size:12px;cursor:pointer;font-family:inherit;transition:all .35s;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.btn-back:hover{border-color:var(--border-strong);color:var(--text)}
@media(max-width:768px){.sidebar{width:260px;min-width:260px}.landmark-banner{height:140px}#map{margin-top:140px;height:calc(100% - 140px)}.map-top{top:156px}.btn-back{top:156px}}
</style>
</head>
<body>
<div class="app-loading" id="loading"><div class="loader"></div></div>
<div class="topbar" id="routeBar"></div>
<div class="main">
<div class="sidebar">
<div class="sidebar-head">
<div class="kicker">旅游路线</div>
<h2 id="routeName"></h2>
<div class="info" id="routeInfo"></div>
</div>
<div class="itinerary" id="itinerary"></div>
</div>
<div class="map-area">
<div class="landmark-banner" id="landmarkBanner">
<img id="landmarkImg" src="" alt="" />
<div class="landmark-spinner" id="landmarkSpinner"></div>
<div class="landmark-shade"></div>
<div class="landmark-label" id="landmarkLabel"></div>
</div>
<div id="map"></div>
<div class="map-top">
<div class="layer-ctrl" id="layerCtrl"></div>
</div>
<button class="btn-back" onclick="history.back()">← 返回</button>
<div class="toast" id="mapToast"></div>
<div class="map-overlay">
<button class="map-ctrl" id="btnPrev">⏮</button>
<button class="map-ctrl" id="btnPlay">▶</button>
<button class="map-ctrl" id="btnNext">⏭</button>
<span class="map-info" id="playInfo">0/0</span>
</div>
</div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
var tileProviders=[
  {name:"卫星",icon:"🛰️",src:"https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",attr:"Esri"},
  {name:"暗色",icon:"🌙",src:"https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",attr:"CARTO"},
  {name:"地形",icon:"🗺️",src:"https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png",attr:"OpenTopoMap"},
  {name:"街道",icon:"🏙️",src:"https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",attr:"OSM"}
];
var routes=[
  {id:"beijing",name:"北京精华游",emoji:"🏯",color:"#d4a44c",center:[39.920,116.410],zoom:12,
   info:"三天五步 · 古都之心 · 约48 km",
   stops:[
    {title:"天安门广场",location:"东城区",lat:39.906,lng:116.398,desc:"升旗降旗、人民英雄纪念碑、国家博物馆。建议早晨6:00抵达看升旗。",tip:"→ 步行 800m",img:"https://source.unsplash.com/800x400/?tiananmen+square+beijing"},
    {title:"故宫",location:"东城区",lat:39.918,lng:116.397,desc:"世界最大木结构古建筑群。红墙金瓦，中轴线三大殿、御花园。预约制，参观约3h。",tip:"→ 地铁 4站",img:"https://source.unsplash.com/800x400/?forbidden+city+beijing"},
    {title:"天坛公园",location:"东城区",lat:39.882,lng:116.407,desc:"明清祭天之所。九音壁、祈年殿、圆丘。晨练的大爷大妈是一景。",tip:"→ 地铁换乘",img:"https://source.unsplash.com/800x400/?temple+of+heaven+beijing"},
    {title:"颐和园",location:"海淀区",lat:39.996,lng:116.287,desc:"慈禧为母亲贺礼而建。石舫、长廊、佛香阁。夏季荷花满池。",tip:"→ 开车 70km",img:"https://source.unsplash.com/800x400/?summer+palace+beijing"},
    {title:"八达岭长城",location:"延庆区",lat:40.358,lng:116.020,desc:"北线精华段。滑车上去步行下来，雄伟险峻。秋季红叶最美。",tip:"✧ 终点",img:"https://source.unsplash.com/800x400/?great+wall+of+china"},
    {title:"延庆柳沟古镇",location:"延庆区",lat:40.463,lng:115.975,desc:"长城脚下的明清古镇。水乡江南风格，冰灯节最美。建议住一晚。",tip:"",img:"https://source.unsplash.com/800x400/?ancient+chinese+village+beijing"}
  ]},
  {id:"shanghai",name:"上海魔都漫步",emoji:"🏙️",color:"#b85a4a",center:[31.240,121.480],zoom:12,
   info:"一日浮光 · 浦西到浦东 · 约15 km",
   stops:[
    {title:"外滩",location:"黄浦区",lat:31.240,lng:121.490,desc:"万国建筑博览群。江对岸陆家嘴、东方明珠。夜景绝佳。",tip:"→ 步行沿江",img:"https://source.unsplash.com/800x400/?the+bund+shanghai"},
    {title:"南京路步行街",location:"黄浦区",lat:31.233,lng:121.475,desc:"百年商业街。石库门建筑、老字号、鲜肉月饼。",tip:"→ 地铁",img:"https://source.unsplash.com/800x400/?nanjing+road+shanghai"},
    {title:"新天地",location:"黄浦区",lat:31.220,lng:121.474,desc:"石库门旁的潮流十里洋场。年轻人聚集地。",tip:"→ 地铁过江",img:"https://source.unsplash.com/800x400/?xintiandi+shanghai"},
    {title:"陆家嘴",location:"浦东新区",lat:31.239,lng:121.500,desc:"中国最高楼。上海中心、环球金融。观景层看全城。",tip:"",img:"https://source.unsplash.com/800x400/?lujiazui+shanghai+skyline"}
  ]},
  {id:"xian",name:"西安古城寻踪",emoji:"🏛️",color:"#5a8a6a",center:[34.280,108.960],zoom:12,
   info:"两日穿越 · 周秦汉唐 · 约30 km",
   stops:[
    {title:"兵马俑",location:"临潼区",lat:34.385,lng:109.273,desc:"世界第八大奇迹。秦始皇陵。千人千面、青铜马车。",tip:"→ 返城",img:"https://source.unsplash.com/800x400/?terracotta+warriors+xian"},
    {title:"钟楼",location:"碑林区",lat:34.261,lng:108.942,desc:"明代古城地标。晨钟暮鼓、青砖绿瓦。灯光秀美轮美奂。",tip:"→ 步行",img:"https://source.unsplash.com/800x400/?bell+tower+xian"},
    {title:"回民街",location:"碑林区",lat:34.263,lng:108.946,desc:"西安小吃天花板。羊肉泡馍、肉夹馍、羊肉串、柿子饼。",tip:"→ 地铁",img:"https://source.unsplash.com/800x400/?muslim+quarter+xian+food"},
    {title:"大雁塔",location:"雁塔区",lat:34.219,lng:108.960,desc:"唐代建，玄奘取经归藏之地。韩国风翻修重建。大唐不夜城旁。",tip:"",img:"https://source.unsplash.com/800x400/?giant+wild+goose+pagoda+xian"}
  ]}
];
var cur,activeStop=-1,markers=[],lines=[],step=-1,playing=false,timer=null,currentLayer=0,tileLayer=null;
var map=L.map("map",{center:[39.92,116.40],zoom:12,minZoom:3,zoomControl:false,attributionControl:false,preferCanvas:true,zoomSnap:0,wheelPxPerZoomLevel:120,worldCopyJump:true});
L.control.zoom({position:"bottomright"}).addTo(map);
L.control.attribution({position:"bottomright",prefix:false}).addTo(map);
function setTile(index){currentLayer=index;if(tileLayer)map.removeLayer(tileLayer);var p=tileProviders[index];tileLayer=L.tileLayer(p.src,{maxZoom:19,attribution:p.attr}).addTo(map);document.querySelectorAll(".layer-btn").forEach(function(b,i){b.classList.toggle("active",i===index)});}
var lc=document.getElementById("layerCtrl");
tileProviders.forEach(function(p,i){var b=document.createElement("button");b.className="layer-btn"+(i===0?" active":"");b.innerHTML='<span class="tip">'+p.name+'</span>'+p.icon;b.onclick=function(){setTile(i)};lc.appendChild(b)});
setTile(0);
function stopIcon(i,isA){var r=isA?38:30,c=isA?"var(--amber)":"var(--gold-border)";return L.divIcon({className:"route-marker",html:'<div class="marker-body'+(isA?" active":"")+'" style="width:'+r+'px;height:'+r+'px;border-color:'+c+'">'+(i+1)+'</div>',iconSize:[r,r],iconAnchor:[r/2,r/2]});}
function showLandmark(imgUrl,label){
  var img=document.getElementById("landmarkImg"),spinner=document.getElementById("landmarkSpinner"),lbl=document.getElementById("landmarkLabel");
  if(!imgUrl){img.src="";lbl.textContent="";return}
  lbl.textContent=label||"";
  spinner.classList.add("show");img.classList.add("loading");
  var pre=new Image();
  pre.onload=function(){img.src=imgUrl;img.classList.remove("loading");spinner.classList.remove("show")};
  pre.onerror=function(){img.classList.remove("loading");spinner.classList.remove("show")};
  pre.src=imgUrl;
}
function select(id){
  activeStop=-1;cur=routes.find(function(r){return r.id===id});
  document.querySelectorAll(".chip").forEach(function(c){c.classList.toggle("active",c.id==="chip-"+id)});
  document.getElementById("routeName").textContent=cur.name;
  document.getElementById("routeInfo").textContent=cur.info;
  renderItinerary();renderMap();
  map.setView(cur.center,cur.zoom,{animate:true,duration:1});
  updateInfo();
  if(cur.stops.length>0)showLandmark(cur.stops[0].img,cur.stops[0].title);
}
function renderItinerary(){
  var el=document.getElementById("itinerary");el.innerHTML="";
  if(!cur)return;
  cur.stops.forEach(function(s,i){
    var d=document.createElement("div");d.className="stop-item";d.id="stop-"+i;
    d.innerHTML='<span class="stop-num">'+(i+1)+'</span><div class="stop-title">'+s.title+'</div><div class="stop-loc">'+s.location+'</div>'+(s.desc?'<div class="stop-desc">'+s.desc+'</div>':"")+(s.tip?'<div class="stop-tip">'+s.tip+'</div>':"");
    d.onclick=function(){gotoStop(i)};el.appendChild(d);
  });
}
function renderMap(){
  markers.forEach(function(m){map.removeLayer(m)});lines.forEach(function(l){map.removeLayer(l)});
  markers=[];lines=[];if(!cur)return;
  var coords=cur.stops.map(function(s){return[s.lat,s.lng]});
  for(var i=0;i<coords.length-1;i++){(function(p1,p2){
    var mlat=(p1[0]+p2[0])/2,mlng=(p1[1]+p2[1])/2;
    var ctrl=[mlat+Math.min(1,.2/Math.abs(p2[0]-p1[0]||.01)),mlng+(Math.random()-.5)*1.5];
    var pts=[];
    for(var j=0;j<=30;j++){var t=j/30;pts.push([(1-t)*(1-t)*p1[0]+2*(1-t)*t*ctrl[0]+t*t*p2[0],(1-t)*(1-t)*p1[1]+2*(1-t)*t*ctrl[1]+t*t*p2[1]])}
    lines.push(L.polyline(pts,{color:cur.color,weight:2,opacity:.35,className:"journey-line-curve",interactive:false}).addTo(map));
  })(coords[i],coords[i+1])}
  cur.stops.forEach(function(s,i){
    var a=i===activeStop;
    var m=L.marker([s.lat,s.lng],{icon:stopIcon(i,a)}).addTo(map);
    m.bindPopup('<div class="popup-inner"><div class="popup-title">📍 '+s.title+'</div><div class="popup-meta">'+s.location+(s.tip?' · '+s.tip:"")+'</div>'+(s.desc?'<div class="popup-desc">'+s.desc+'</div>':"")+'</div>',{maxWidth:300,closeButton:true,className:"custom-popup"});
    markers.push(m);
  });
}
function gotoStop(i){
  if(!cur||i<0||i>=cur.stops.length)return;
  activeStop=i;var s=cur.stops[i];
  document.querySelectorAll(".stop-item").forEach(function(el,j){el.classList.toggle("active",j===i)});
  var si=document.getElementById("stop-"+i);if(si)si.scrollIntoView({behavior:"smooth",block:"center"});
  markers.forEach(function(m,j){m.setIcon(stopIcon(j,j===i));if(j===i)m.bringToFront()});
  map.flyTo([s.lat,s.lng],15,{duration:.8});
  step=i;updateInfo();
  if(s.img)showLandmark(s.img,s.title);
  var toast=document.getElementById("mapToast");
  toast.textContent="📍 "+s.title;
  toast.classList.add("show");clearTimeout(toast._t);
  toast._t=setTimeout(function(){toast.classList.remove("show")},3500);
}
function updateInfo(){
  if(!cur){document.getElementById("playInfo").textContent="0/0";return}
  document.getElementById("playInfo").textContent=(step+1)+"/"+cur.stops.length;
}
function start(){
  if(!cur)return;if(step>=cur.stops.length-1)step=-1;
  playing=true;document.getElementById("btnPlay").textContent="⏸";
  document.getElementById("btnPlay").classList.add("playing");advance();
}
function stop(){
  playing=false;if(timer)clearTimeout(timer);timer=null;
  document.getElementById("btnPlay").textContent="▶";
  document.getElementById("btnPlay").classList.remove("playing");
}
function advance(){
  if(!playing)return;var n=step+1;
  if(n>=cur.stops.length){stop();return}
  gotoStop(n);timer=setTimeout(advance,3500);
}
document.getElementById("btnPrev").onclick=function(){stop();if(cur&&step>0)gotoStop(step-1)};
document.getElementById("btnNext").onclick=function(){stop();if(cur&&step<cur.stops.length-1)gotoStop(step+1)};
document.getElementById("btnPlay").onclick=function(){playing?stop():start()};
document.addEventListener("keydown",function(ev){
  if(!cur)return;
  if(ev.key==="ArrowRight"||ev.key==="d"){stop();if(step<cur.stops.length-1)gotoStop(step+1)}
  if(ev.key==="ArrowLeft"||ev.key==="a"){stop();if(step>0)gotoStop(step-1)}
  if(ev.key===" "){ev.preventDefault();playing?stop():start()}
});
var rb=document.getElementById("routeBar");
routes.forEach(function(r){
  var c=document.createElement("div");c.className="chip";c.id="chip-"+r.id;
  c.innerHTML='<div class="dot" style="background:'+r.color+'">'+r.emoji+'</div>'+r.name;
  c.onclick=function(){stop();select(r.id)};rb.appendChild(c);
});
select("beijing");
setTimeout(function(){document.getElementById("loading").classList.add("hide")},300);
</script>
</body>
