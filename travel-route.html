<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<meta name="theme-color" content="#0d0a06">
<link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
:root{--bg:#0d0a06;--surface:#18130d;--border:rgba(160,130,90,.1);--border-strong:rgba(160,130,90,.16);--text:#e8dfd2;--text-2:#a89880;--text-3:#6b5d4a;--gold:#d4a44c;--gold-soft:rgba(212,164,76,.1);--gold-border:#b8893a;--amber:#e8c050}
body{font-family:"Urbanist","Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh;overflow:hidden}
body::after{content:"";position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.55' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.02'/%3E%3C/svg%3E");pointer-events:none;z-index:0}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{border-radius:4px;background:var(--text-3)}
.app-loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s}
.app-loading.hide{opacity:0;pointer-events:none}
.loader{width:24px;height:24px;border-radius:50%;border:2px solid var(--border-strong);border-top-color:var(--gold);animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.topbar{display:flex;align-items:center;padding:10px 20px;gap:6px;background:rgba(13,10,6,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;z-index:10;position:relative}
.topbar::-webkit-scrollbar{height:0}
.chip{display:flex;align-items:center;gap:8px;padding:7px 14px;border-radius:20px;cursor:pointer;border:1px solid transparent;white-space:nowrap;transition:all .4s;font-size:13px;font-weight:500;color:var(--text-2);flex-shrink:0}
.chip:hover{border-color:var(--border-strong);color:var(--text)}
.chip.active{background:var(--gold-soft);border-color:rgba(212,164,76,.25);color:var(--gold)}
.chip .dot{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.main{display:flex;flex:1;overflow:hidden;position:relative}
.sidebar{width:360px;min-width:360px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:5}
.sidebar-head{padding:18px 22px 14px;border-bottom:1px solid var(--border)}
.sidebar-head .kicker{font-size:9px;font-weight:700;letter-spacing:4px;color:var(--gold);text-transform:uppercase;margin-bottom:4px}
.sidebar-head h2{font-family:"Noto Serif SC",serif;font-size:18px;font-weight:700;color:#dcc8a8}
.sidebar-head .info{font-size:11px;color:var(--text-3);margin-top:4px}
.itinerary{flex:1;overflow-y:auto;padding:6px 14px 14px 20px;scroll-behavior:smooth}
.stop-item{position:relative;padding:13px 0 13px 30px;cursor:pointer;border-radius:10px;margin:1px 0;transition:all .35s}
.stop-item:hover{background:rgba(160,130,90,.04)}
.stop-item.active{background:var(--gold-soft)}
.stop-item::before{content:"";position:absolute;left:9px;top:0;bottom:0;width:1px;background:var(--border)}
.stop-item:first-child::before{top:22px}
.stop-item:last-child::before{bottom:calc(100% - 22px)}
.stop-item::after{content:"";position:absolute;left:3px;top:18px;width:13px;height:13px;border-radius:50%;background:var(--surface);border:2px solid var(--border-strong);transition:all .35s;z-index:1}
.stop-item.active::after{background:var(--gold);border-color:var(--gold);box-shadow:0 0 14px rgba(212,164,76,.5);transform:scale(1.2)}
.stop-num{position:absolute;left:0;top:14px;font-size:8px;font-weight:700;color:var(--text-3);width:18px;text-align:center;z-index:2;background:var(--surface);line-height:18px;border-radius:50%}
.stop-item.active .stop-num{color:var(--bg);background:transparent}
.stop-title{font-size:13px;font-weight:600;line-height:1.3}
.stop-loc{font-size:11px;color:var(--text-2);margin-top:1px}
.stop-tip{font-size:10px;color:var(--amber);margin-top:5px;padding:4px 8px;border-radius:8px;background:rgba(224,184,76,.07);display:inline-block}
.stop-desc{font-size:11px;color:var(--text-3);margin-top:5px;line-height:1.5}
.map-area{flex:1;position:relative}
.landmark-banner{position:absolute;top:0;left:0;right:0;height:200px;z-index:3;overflow:hidden;border-bottom:1px solid var(--border)}
.landmark-banner .bg-img{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0;transition:opacity .6s}
.landmark-banner .bg-img.on{opacity:1}
.landmark-banner .bg-gradient{position:absolute;inset:0;opacity:1;transition:opacity .6s}
.landmark-banner .bg-gradient.off{opacity:0}
.landmark-banner .banner-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(13,10,6,.9) 0%,rgba(13,10,6,.35) 50%,rgba(13,10,6,.1) 100%)}
.landmark-banner .banner-info{position:absolute;bottom:16px;left:20px;right:20px;display:flex;align-items:flex-end;justify-content:space-between}
.landmark-banner .banner-title{font-family:"Noto Serif SC",serif;font-size:22px;font-weight:900;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,.6)}
.landmark-banner .banner-loc{font-size:11px;color:rgba(255,255,255,.6);margin-top:4px}
.landmark-banner .banner-emoji{font-size:48px;filter:drop-shadow(0 4px 16px rgba(0,0,0,.5));flex-shrink:0;margin-left:12px}
.landmark-banner .banner-spin{position:absolute;top:12px;right:16px;width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,.25);border-top-color:#fff;animation:spin .6s linear infinite;display:none}
#map{margin-top:200px;height:calc(100% - 200px);width:100%;background:var(--bg)}
.map-top{position:absolute;top:212px;left:12px;z-index:5}
.layer-ctrl{display:flex;gap:3px;background:rgba(13,10,6,.88);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);padding:3px;border-radius:18px;border:1px solid var(--border);flex-wrap:wrap;max-width:148px}
.layer-btn{width:28px;height:28px;border-radius:50%;border:1px solid transparent;background:rgba(255,255,255,.03);cursor:pointer;font-size:12px;transition:all .35s;display:flex;align-items:center;justify-content:center;padding:0;position:relative;flex-shrink:0}
.layer-btn:hover{border-color:var(--border-strong)}
.layer-btn.active{background:var(--gold-soft);border-color:rgba(212,164,76,.25)}
.layer-btn .tip{position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%) translateY(2px);font-size:9px;white-space:nowrap;color:var(--text-2);opacity:0;pointer-events:none;transition:all .3s}
.layer-btn:hover .tip{opacity:1;transform:translateX(-50%) translateY(0)}
.map-overlay{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);z-index:5;display:flex;align-items:center;gap:6px;background:rgba(13,10,6,.9);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);padding:5px 10px;border-radius:22px;border:1px solid var(--border);pointer-events:auto}
.map-ctrl{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);cursor:pointer;background:rgba(255,255,255,.03);display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .35s;color:var(--text-2);flex-shrink:0}
.map-ctrl:hover{border-color:var(--border-strong);color:var(--text)}
.map-ctrl.playing{background:var(--gold-soft);border-color:rgba(212,164,76,.3);color:var(--gold)}
.map-info{font-size:10px;color:var(--text-2);font-weight:500;min-width:60px;text-align:center}
.toast{position:absolute;bottom:80px;left:50%;transform:translateX(-50%) translateY(8px);z-index:6;font-size:14px;font-weight:600;background:rgba(13,10,6,.92);border:1px solid rgba(212,164,76,.25);padding:7px 18px;border-radius:16px;pointer-events:none;opacity:0;transition:all .4s;color:var(--gold)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.route-marker{background:transparent!important;border:none!important}
.route-marker .marker-body{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid var(--gold-border);background:rgba(20,15,10,.85);box-shadow:0 0 12px rgba(212,175,55,.1),0 2px 8px rgba(0,0,0,.5);transition:all .3s;position:relative;color:var(--text)}
.route-marker .marker-body.active{width:40px;height:40px;font-size:14px;border-color:var(--amber);background:rgba(30,20,10,.9);box-shadow:0 0 24px rgba(232,192,80,.35),0 3px 12px rgba(0,0,0,.6)}
.route-line-glow{pointer-events:none}
.route-line-dash{stroke-dasharray:10 8;animation:dashflow 1s linear infinite;pointer-events:none}
@keyframes dashflow{to{stroke-dashoffset:-18}}
.custom-popup .leaflet-popup-content-wrapper{background:rgba(24,19,13,.94);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--border-strong);border-radius:12px;color:var(--text);box-shadow:0 12px 40px rgba(0,0,0,.4);padding:0}
.custom-popup .leaflet-popup-content{margin:14px 18px;font-family:inherit;font-size:13px;line-height:1.5}
.custom-popup .leaflet-popup-tip{display:none}
.custom-popup .leaflet-popup-close-button{color:var(--text-3)!important;font-size:18px!important;font-weight:300;top:6px!important;right:10px!important}
.popup-title{font-weight:600;font-size:14px;margin-bottom:4px;color:var(--gold)}
.popup-meta{font-size:10px;color:var(--text-3);margin-bottom:6px}
.popup-desc{font-size:11px;color:var(--text-2);line-height:1.5}
.btn-back{position:absolute;top:212px;right:12px;z-index:5;padding:5px 12px;border-radius:14px;border:1px solid var(--border);background:rgba(13,10,6,.88);color:var(--text-2);font-size:11px;cursor:pointer;font-family:inherit;transition:all .35s;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.btn-back:hover{border-color:var(--border-strong);color:var(--text)}
@media(max-width:768px){.sidebar{width:260px;min-width:260px}.landmark-banner{height:150px}#map{margin-top:150px;height:calc(100% - 150px)}.map-top{top:162px}.btn-back{top:162px}.banner-title{font-size:17px}.banner-emoji{font-size:36px}}
</style>
</head>

  };
  pre.src=url;
  setTimeout(function(){if(spin.style.display!=="none"){spin.style.display="none";console.log("timeout: "+s.p)}},10000);
}
function select(id){
  as=-1;cur=RS.find(function(r){return r.id===id});
  document.querySelectorAll(".chip").forEach(function(c){c.classList.toggle("active",c.id==="chip-"+id)});
  document.getElementById("routeName").textContent=cur.name;document.getElementById("routeInfo").textContent=cur.info;
  renderTL();renderMap();
  map.setView(cur.ct,cur.zm,{animate:true,duration:1});
  upInfo();showBanner(cur.ss[0]);
}
function renderTL(){var el=document.getElementById("itinerary");el.innerHTML="";if(!cur)return;cur.ss.forEach(function(s,i){var d=document.createElement("div");d.className="stop-item";d.id="stop-"+i;d.innerHTML='<span class="stop-num">'+(i+1)+'</span><div class="stop-title">'+s.t+'</div><div class="stop-loc">'+s.l+'</div>'+(s.d?'<div class="stop-desc">'+s.d+'</div>':"")+(s.tip?'<div class="stop-tip">'+s.tip+'</div>':"");d.onclick=function(){toStop(i)};el.appendChild(d)})}
function renderMap(){mks.forEach(function(m){map.removeLayer(m)});lns.forEach(function(l){map.removeLayer(l)});gls.forEach(function(g){map.removeLayer(g)});mks=[];lns=[];gls=[];if(!cur)return;var cs=cur.ss.map(function(s){return[s.la,s.ln]});for(var i=0;i<cs.length-1;i++){(function(p1,p2){var mlat=(p1[0]+p2[0])/2,mlng=(p1[1]+p2[1])/2;var ctrl=[mlat+Math.min(1.5,.3/Math.abs(p2[0]-p1[0]||.01)),mlng+(Math.random()-.5)*2];var pts=[];for(var j=0;j<=50;j++){var t=j/50;pts.push([(1-t)*(1-t)*p1[0]+2*(1-t)*t*ctrl[0]+t*t*p2[0],(1-t)*(1-t)*p1[1]+2*(1-t)*t*ctrl[1]+t*t*p2[1]])}gls.push(L.polyline(pts,{color:cur.ch,weight:6,opacity:.3,interactive:false,className:"route-line-glow"}).addTo(map));lns.push(L.polyline(pts,{color:"#ffffff",weight:3,opacity:.8,dashArray:"12 8",interactive:false,className:"route-line-dash"}).addTo(map))})(cs[i],cs[i+1])}cur.ss.forEach(function(s,i){var a=i===as;var m=L.marker([s.la,s.ln],{icon:mkIcon(i,a)}).addTo(map);m.bindPopup('<div class="popup-inner"><div class="popup-title">📍 '+s.t+'</div><div class="popup-meta">'+s.l+(s.tip?' · '+s.tip:"")+'</div>'+(s.d?'<div class="popup-desc">'+s.d+'</div>':"")+'</div>',{maxWidth:300,closeButton:true,className:"custom-popup"});m.on("click",function(){toStop(i)});mks.push(m)})}
function toStop(i){if(!cur||i<0||i>=cur.ss.length)return;as=i;var s=cur.ss[i];document.querySelectorAll(".stop-item").forEach(function(el,j){el.classList.toggle("active",j===i)});var si=document.getElementById("stop-"+i);if(si)si.scrollIntoView({behavior:"smooth",block:"center"});mks.forEach(function(m,j){m.setIcon(mkIcon(j,j===i));if(j===i)m.bringToFront()});map.flyTo([s.la,s.ln],15,{duration:1.2,easeLinearity:.25});step=i;upInfo();showBanner(s);var toast=document.getElementById("mapToast");toast.textContent=s.e+" "+s.t;toast.classList.add("show");clearTimeout(toast._t);toast._t=setTimeout(function(){toast.classList.remove("show")},2800)}
function upInfo(){if(!cur){document.getElementById("playInfo").textContent="0/0";return}document.getElementById("playInfo").textContent=(step+1)+"/"+cur.ss.length}
function start(){if(!cur)return;if(step>=cur.ss.length-1)step=-1;playing=true;document.getElementById("btnPlay").textContent="⏸";document.getElementById("btnPlay").classList.add("playing");advance()}
function stop(){playing=false;if(tmr)clearTimeout(tmr);tmr=null;document.getElementById("btnPlay").textContent="▶";document.getElementById("btnPlay").classList.remove("playing")}
function advance(){if(!playing)return;var n=step+1;if(n>=cur.ss.length){stop();return}toStop(n);tmr=setTimeout(advance,3000)}
document.getElementById("btnPrev").onclick=function(){stop();if(cur&&step>0)toStop(step-1)};
document.getElementById("btnNext").onclick=function(){stop();if(cur&&step<cur.ss.length-1)toStop(step+1)};
document.getElementById("btnPlay").onclick=function(){playing?stop():start()};
document.addEventListener("keydown",function(ev){if(!cur)return;if(ev.key==="ArrowRight"||ev.key==="d"){stop();if(step<cur.ss.length-1)toStop(step+1)}if(ev.key==="ArrowLeft"||ev.key==="a"){stop();if(step>0)toStop(step-1)}if(ev.key===" "){ev.preventDefault();playing?stop():start()}});
var rb=document.getElementById("routeBar");RS.forEach(function(r){var c=document.createElement("div");c.className="chip";c.id="chip-"+r.id;c.innerHTML='<div class="dot" style="background:'+r.color+'">'+r.emoji+'</div>'+r.name;c.onclick=function(){stop();select(r.id)};rb.appendChild(c)});
select("bj");
setTimeout(function(){document.getElementById("loading").classList.add("hide")},300);
</script>
</body>
