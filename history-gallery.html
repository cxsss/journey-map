<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>历史长廊 · 轨迹地图</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
:root{--bg:#f5f0e6;--surface:#faf7ef;--border:#d4c8b0;--text:#3d3226;--text-dim:#8b7a62;--accent:#8b5e3c;--accent-glow:#b8864e;--timeline-line:#d4c8b0;--card-hover:#f0e8d5}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Noto Serif SC","STSong","Songti SC","Microsoft YaHei",serif;background:var(--bg);display:flex;height:100vh;overflow:hidden}
.sidebar{width:400px;min-width:400px;background:var(--surface);border-right:2px solid var(--border);display:flex;flex-direction:column;z-index:10}
.sidebar-header{padding:24px 28px 16px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,rgba(139,94,60,0.08) 0%,transparent 100%)}
.sidebar-header h1{font-size:22px;font-weight:700;letter-spacing:3px;color:var(--accent);font-family:"Noto Serif SC","STSong","Songti SC",serif}
.sidebar-header .subtitle{font-size:13px;color:var(--text-dim);margin-top:4px;font-style:italic}
.era-filters{display:flex;gap:8px;padding:12px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.era-chip{padding:5px 14px;border-radius:3px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:rgba(139,94,60,0.04);color:var(--text-dim);transition:all .2s;user-select:none;font-family:"Noto Serif SC","STSong",serif}
.era-chip:hover,.era-chip.active{background:rgba(139,94,60,0.15);border-color:var(--accent);color:var(--accent)}
.timeline-container{flex:1;overflow-y:auto;padding:4px 16px 20px 28px;scroll-behavior:smooth}
.timeline-container::-webkit-scrollbar{width:4px}
.timeline-container::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.timeline-era{font-size:13px;color:var(--accent);padding:12px 0 4px;font-weight:700;letter-spacing:2px;font-family:"Noto Serif SC","STSong",serif;border-bottom:1px dotted var(--border);margin-bottom:4px}
.timeline-item{position:relative;padding:12px 0 12px 24px;cursor:pointer;transition:all .2s;border-radius:2px;margin:1px 0}
.timeline-item:hover,.timeline-item.active{background:var(--card-hover)}
.timeline-item::before{content:"";position:absolute;left:5px;top:0;bottom:0;width:1px;background:var(--timeline-line)}
.timeline-item:first-child::before{top:18px}
.timeline-item:last-child::before{bottom:calc(100% - 18px)}
.timeline-item::after{content:"";position:absolute;left:0;top:20px;width:11px;height:11px;border-radius:50%;background:var(--surface);border:2px solid var(--border);transition:all .25s;z-index:1}
.timeline-item.active::after,.timeline-item:hover::after{border-color:var(--accent);background:var(--accent);box-shadow:0 0 8px rgba(139,94,60,.4)}
.timeline-date{font-size:11px;color:var(--text-dim);margin-bottom:2px;font-family:"SF Mono","Cascadia Code","Consolas",monospace;font-variant-numeric:tabular-nums}
.timeline-title{font-size:15px;font-weight:600;margin-bottom:1px;font-family:"Noto Serif SC","STSong",serif}
.timeline-meta{font-size:11px;color:var(--text-dim);display:flex;align-items:center;gap:6px}
.timeline-person{font-size:10px;padding:1px 8px;border-radius:2px;font-weight:600}
.map-wrapper{flex:1;position:relative}
#map{width:100%;height:100%}
#map .leaflet-tile-pane{filter:sepia(0.4) saturate(0.6) brightness(1.05)}
.btn-overview{position:absolute;bottom:24px;right:20px;z-index:1000;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:9px 16px;border-radius:3px;cursor:pointer;font-size:13px;transition:all .2s;font-family:"Noto Serif SC","STSong",serif}
.btn-overview:hover{background:var(--card-hover);border-color:var(--accent)}
.stats-bar{position:absolute;top:16px;right:16px;z-index:1000;background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:10px 18px;display:flex;gap:20px}
.stat-item{text-align:center}
.stat-num{font-size:22px;font-weight:700;color:var(--accent)}
.stat-label{font-size:10px;color:var(--text-dim)}
.custom-popup .leaflet-popup-content-wrapper{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:3px;box-shadow:0 4px 20px rgba(61,50,38,0.15)}
.custom-popup .leaflet-popup-tip{background:var(--surface)}
@media(max-width:768px){body{flex-direction:column}.sidebar{width:100%;min-width:unset;max-height:38vh}.map-wrapper{flex:1;min-height:62vh}}
</style>
</head>

      {date:"1836年",title:"环球归来",location:"法尔茅斯 · 英国",lat:50.15,lng:-5.07,desc:"五年考察结束，带回大量标本和笔记。"},
      {date:"1859年",title:"发表《物种起源》",location:"伦敦 · 英国",lat:51.51,lng:-0.13,desc:"出版《物种起源》，提出自然选择理论。首版1250册当日售罄。",icon:"📕"},
      {date:"1882年",title:"葬于西敏寺",location:"伦敦 · 英国",lat:51.5,lng:-0.13,desc:"逝世，享年七十三。葬于威斯敏斯特大教堂，与牛顿为邻。",icon:"🕯️"}
    ]
  }
];

// ===================== 初始化地图 =====================
var map = L.map("map", {
  center: [35, 40],
  zoom: 3,
  zoomControl: false,
  attributionControl: false
});
L.control.zoom({position:"bottomleft"}).addTo(map);
L.control.attribution({position:"bottomleft",prefix:false}).addTo(map);

// 复古风格底图
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 18,
  attribution: "&copy; OpenStreetMap"
}).addTo(map);

// ===================== 绘制轨迹 =====================
var personLayers = {};

function drawAllTrajectories() {
  Object.values(personLayers).forEach(function(g){g.forEach(function(l){map.removeLayer(l)})});
  personLayers = {};
  people.forEach(function(person) {
    var layers = [];
    var coords = person.events.map(function(e){return [e.lat, e.lng]});
    
    // 大弧线连接事件点
    if (coords.length > 1) {
      for (var i = 0; i < coords.length - 1; i++) {
        (function(p1, p2, c) {
          var midLat = (p1[0] + p2[0]) / 2, midLng = (p1[1] + p2[1]) / 2;
          var offset = Math.min(3, 0.5 / Math.abs(p2[0] - p1[0] || 1));
          var ctrl = [midLat + offset, midLng + (Math.random() - 0.5) * 2.5];
          var pts = [];
          for (var j = 0; j <= 40; j++) {
            var t = j / 40;
            pts.push([
              (1 - t) * (1 - t) * p1[0] + 2 * (1 - t) * t * ctrl[0] + t * t * p2[0],
              (1 - t) * (1 - t) * p1[1] + 2 * (1 - t) * t * ctrl[1] + t * t * p2[1]
            ]);
          }
          var line = L.polyline(pts, {
            color: c,
            weight: 2.5,
            opacity: 0.55,
            dashArray: "6 8",
            interactive: false
          }).addTo(map);
          layers.push(line);
        })(coords[i], coords[i + 1], person.color);
      }
    }

    // 事件标记
    person.events.forEach(function(event, idx) {
      var isSignificant = event.icon;
      var iconHtml = "<div style=\"" +
        "width:" + (isSignificant ? 36 : 24) + "px;" +
        "height:" + (isSignificant ? 36 : 24) + "px;" +
        "background:" + person.color + ";" +
        "border-radius:50%;" +
        "display:flex;align-items:center;justify-content:center;" +
        "font-size:" + (isSignificant ? 20 : 14) + "px;" +
        "color:#fff;" +
        "border:2px solid #fff;" +
        "box-shadow:0 2px 8px rgba(0,0,0,0.3);" +
        "transform:translate(-50%,-50%);" +
        "cursor:pointer;" +
        "\">" + (event.icon || person.emoji) + "</div>";
      
      var marker = L.marker([event.lat, event.lng], {
        icon: L.divIcon({
          html: iconHtml,
          className: "",
          iconSize: [isSignificant ? 36 : 24, isSignificant ? 36 : 24],
          iconAnchor: [isSignificant ? 18 : 12, isSignificant ? 18 : 12]
        })
      }).addTo(map);

      marker.bindPopup(
        "<div style=\"font-family:'PingFang SC','Noto Serif SC','STSong',serif;min-width:200px\">" +
        "<div style=\"font-size:18px;margin-bottom:6px\">" + person.emoji + " " + event.title + "</div>" +
        "<div style=\"font-size:11px;color:#8b7a62;margin-bottom:2px\">📍 " + event.location + "</div>" +
        "<div style=\"font-size:11px;color:#8b7a62;margin-bottom:4px\">📅 " + event.date + "</div>" +
        "<div style=\"font-size:11px;margin-bottom:4px;color:#3d3226\">👤 " + person.name + "</div>" +
        "<div style=\"font-size:12px;margin-top:6px;line-height:1.6;color:#555\">" + (event.desc || "") + "</div></div>",
        {maxWidth: 260, className: "custom-popup"}
      );

      layers.push(marker);
    });

    personLayers[person.id] = layers;
  });
}

// ===================== 构建时间轴 =====================
var allItems = [];
var eraSet = {};

people.forEach(function(person) {
  person.events.forEach(function(event) {
    allItems.push({
      person: person,
      event: event,
      era: person.era
    });
    eraSet[person.era] = true;
  });
});

// 按时间排序
allItems.sort(function(a, b) {
  var da = a.event.date, db = b.event.date;
  var na = parseInt(da) || 0, nb = parseInt(db) || 0;
  if (da.indexOf("前") >= 0) na = -na;
  if (db.indexOf("前") >= 0) nb = -nb;
  return na - nb;
});

// 渲染时间轴
var timelineEl = document.getElementById("timeline");
var currentEra = "";
allItems.forEach(function(item, idx) {
  if (item.era !== currentEra) {
    currentEra = item.era;
    var eraDiv = document.createElement("div");
    eraDiv.className = "timeline-era";
    eraDiv.textContent = currentEra;
    eraDiv.dataset.era = currentEra;
    timelineEl.appendChild(eraDiv);
  }
  
  var div = document.createElement("div");
  div.className = "timeline-item";
  div.dataset.index = idx;
  div.dataset.era = item.era;
  div.innerHTML =
    "<div class=\"timeline-date\">" + item.event.date + "</div>" +
    "<div class=\"timeline-title\">" + (item.event.icon ? item.event.icon + " " : "") + item.event.title + "</div>" +
    "<div class=\"timeline-meta\">" +
    "<span class=\"timeline-person\" style=\"background:" + item.person.color + "20;color:" + item.person.color + "\">" + item.person.emoji + " " + item.person.name + "</span>" +
    "📍 " + item.event.location + "</div>";
  
  div.addEventListener("click", function() { focusEvent(idx); });
  timelineEl.appendChild(div);
});

// 渲染时代筛选
var eraFilters = document.getElementById("eraFilters");
var eras = Object.keys(eraSet);
var activeEra = null;

var allChip = document.createElement("div");
allChip.className = "era-chip active";
allChip.textContent = "全部";
allChip.addEventListener("click", function() {
  activeEra = null;
  document.querySelectorAll(".era-chip").forEach(function(c) { c.classList.remove("active"); });
  allChip.classList.add("active");
  filterByEra(null);
});
eraFilters.appendChild(allChip);

eras.forEach(function(era) {
  var chip = document.createElement("div");
  chip.className = "era-chip";
  chip.textContent = era;
  chip.addEventListener("click", function() {
    activeEra = era;
    document.querySelectorAll(".era-chip").forEach(function(c) { c.classList.remove("active"); });
    chip.classList.add("active");
    filterByEra(era);
  });
  eraFilters.appendChild(chip);
});

function filterByEra(era) {
  document.querySelectorAll(".timeline-item").forEach(function(el) {
    el.style.display = (!era || el.dataset.era === era) ? "" : "none";
  });
  document.querySelectorAll(".timeline-era").forEach(function(el) {
    el.style.display = (!era || el.dataset.era === era) ? "" : "none";
  });
}

// ===================== 统计 =====================
document.getElementById("statPeople").textContent = people.length;
document.getElementById("statEvents").textContent = allItems.length;
document.getElementById("statEras").textContent = Object.keys(eraSet).length;

// ===================== 交互 =====================
var activeIdx = -1;

function focusEvent(idx) {
  if (activeIdx === idx) { activeIdx = -1; resetHighlight(); fitAllBounds(); return; }
  activeIdx = idx;
  var item = allItems[idx];
  document.querySelectorAll(".timeline-item").forEach(function(el, i) { el.classList.toggle("active", i === idx); });
  map.flyTo([item.event.lat, item.event.lng], 6, { duration: 1.2 });
  var items = document.querySelectorAll(".timeline-item");
  if (items[idx]) items[idx].scrollIntoView({ behavior: "smooth", block: "center" });
}

function resetHighlight() {
  document.querySelectorAll(".timeline-item").forEach(function(el) { el.classList.remove("active"); });
}

function fitAllBounds() {
  var allCoords = [];
  people.forEach(function(p) { p.events.forEach(function(e) { allCoords.push([e.lat, e.lng]); }); });
  if (allCoords.length > 0) map.flyToBounds(L.latLngBounds(allCoords).pad(0.15), { duration: 1 });
}

document.getElementById("btnOverview").addEventListener("click", function() {
  activeIdx = -1; resetHighlight(); fitAllBounds();
});

// ===================== 启动 =====================
drawAllTrajectories();
fitAllBounds();
console.log("📜 历史长廊已就绪！" + people.length + "位先贤，" + allItems.length + "个历史事件。");
</script>
</body>
</html>
