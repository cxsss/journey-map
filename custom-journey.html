<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自定义历程 · 轨迹地图</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
:root{--bg:#f5f0e6;--surface:#faf7ef;--border:#d4c8b0;--text:#3d3226;--text-dim:#8b7a62;--accent:#8b5e3c;--accent-glow:#b8864e;--timeline-line:#d4c8b0;--card-hover:#f0e8d5}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Noto Serif SC","STSong","Songti SC","Microsoft YaHei",serif;background:var(--bg);display:flex;height:100vh;overflow:hidden}
.sidebar{width:400px;min-width:400px;background:var(--surface);border-right:2px solid var(--border);display:flex;flex-direction:column;z-index:10;transition:all .35s}
.sidebar.editing{width:520px;min-width:520px}
.sidebar-header{padding:20px 24px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.sidebar-header h1{font-size:20px;font-weight:700;letter-spacing:2px;color:var(--accent);font-family:"Noto Serif SC","STSong",serif}
.sidebar-header .btn-edit{font-size:13px;padding:6px 14px;border-radius:3px;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);cursor:pointer;transition:all .2s;font-family:"Noto Serif SC","STSong",serif}
.sidebar-header .btn-edit:hover{border-color:var(--accent);color:var(--accent)}
.timeline-container{flex:1;overflow-y:auto;padding:4px 16px 20px 24px;scroll-behavior:smooth}
.timeline-container::-webkit-scrollbar{width:4px}
.timeline-container::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.timeline-item{position:relative;padding:14px 0 14px 26px;cursor:pointer;transition:all .2s;border-radius:2px;margin:1px 0}
.timeline-item:hover,.timeline-item.active{background:var(--card-hover)}
.timeline-item::before{content:"";position:absolute;left:5px;top:0;bottom:0;width:1px;background:var(--timeline-line)}
.timeline-item:first-child::before{top:20px}
.timeline-item:last-child::before{bottom:calc(100% - 20px)}
.timeline-item::after{content:"";position:absolute;left:0;top:22px;width:11px;height:11px;border-radius:50%;background:var(--surface);border:2px solid var(--border);transition:all .25s;z-index:1}
.timeline-item.active::after,.timeline-item:hover::after{border-color:var(--accent);background:var(--accent);box-shadow:0 0 8px rgba(139,94,60,.4)}
.timeline-date{font-size:11px;color:var(--text-dim);margin-bottom:2px;font-family:"SF Mono","Cascadia Code","Consolas",monospace}
.timeline-title{font-size:15px;font-weight:600;margin-bottom:1px}
.timeline-location{font-size:12px;color:var(--text-dim)}
.editor-panel{display:none;flex:1;padding:16px 20px;flex-direction:column;gap:12px;overflow-y:auto}
.sidebar.editing .timeline-container{display:none}
.sidebar.editing .editor-panel{display:flex}
.editor-panel textarea{flex:1;min-height:300px;background:var(--card-hover);border:1px solid var(--border);border-radius:3px;color:var(--text);padding:14px;font-family:"SF Mono","Cascadia Code","Consolas",monospace;font-size:12px;resize:vertical;line-height:1.6}
.editor-panel textarea:focus{outline:none;border-color:var(--accent)}
.editor-panel .hint{font-size:11px;color:var(--text-dim);line-height:1.6}
.editor-panel .hint code{background:var(--card-hover);padding:1px 5px;border-radius:2px;font-size:11px}
.editor-actions{display:flex;gap:8px}
.editor-actions button{padding:8px 18px;border-radius:3px;font-size:13px;cursor:pointer;border:1px solid var(--border);transition:all .2s;font-family:"Noto Serif SC","STSong",serif}
.btn-apply{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-apply:hover{background:#7a4e2e}
.btn-cancel{background:var(--surface);color:var(--text-dim)}
.btn-cancel:hover{border-color:var(--accent);color:var(--accent)}
.btn-sample{background:var(--surface);color:var(--text-dim)}
.btn-download{background:var(--surface);color:var(--text-dim)}
.btn-upload{position:relative;overflow:hidden;background:var(--surface);color:var(--text-dim)}
.btn-upload input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.map-wrapper{flex:1;position:relative}
#map{width:100%;height:100%}
#map .leaflet-tile-pane{filter:sepia(0.4) saturate(0.6) brightness(1.05)}
.btn-overview{position:absolute;bottom:24px;right:20px;z-index:1000;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:9px 16px;border-radius:3px;cursor:pointer;font-size:13px;transition:all .2s;font-family:"Noto Serif SC","STSong",serif}
.btn-overview:hover{background:var(--card-hover);border-color:var(--accent)}
.map-stats{position:absolute;top:16px;right:16px;z-index:1000;background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:10px 18px}
.map-stats .stat-num{font-size:22px;font-weight:700;color:var(--accent)}
.map-stats .stat-label{font-size:10px;color:var(--text-dim)}
.custom-popup .leaflet-popup-content-wrapper{background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:3px;box-shadow:0 4px 20px rgba(61,50,38,0.15)}
.custom-popup .leaflet-popup-tip{background:var(--surface)}
.back-link{position:absolute;top:16px;left:16px;z-index:1000;background:var(--surface);border:1px solid var(--border);color:var(--text-dim);padding:6px 12px;border-radius:3px;font-size:12px;text-decoration:none;transition:all .2s}
.back-link:hover{border-color:var(--accent);color:var(--accent)}
@media(max-width:768px){body{flex-direction:column}.sidebar{width:100%;min-width:unset;max-height:38vh}.sidebar.editing{width:100%;min-width:unset;max-height:60vh}.map-wrapper{flex:1;min-height:62vh}}
</style>
</head>
<body>
<a href="index.html" class="back-link">← 返回首页</a>
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h1>🧭 自定义历程</h1>
    <button class="btn-edit" id="btnEdit">✎ 编辑数据</button>
  </div>
  <div class="timeline-container" id="timeline"></div>
  <div class="editor-panel" id="editorPanel">
    <textarea id="editor" placeholder="在此粘贴或编辑 JSON 数据..."></textarea>
    <div class="hint">
      格式说明：数组，每项包含 <code>date</code>（日期）、<code>title</code>（标题）、<code>location</code>（地点）、<code>lat</code>（纬度）、<code>lng</code>（经度）、<code>desc</code>（描述）、<code>icon</code>（emoji 图标，可选）。<br>
      经纬度可在 <a href="https://www.latlong.net" target="_blank" style="color:var(--accent)">latlong.net</a> 查询。
    </div>
    <div class="editor-actions">
      <button class="btn-apply" id="btnApply">✓ 应用</button>
      <button class="btn-cancel" id="btnCancel">取消</button>
      <button class="btn-sample" id="btnSample">📋 加载示例</button>
      <button class="btn-upload">📁 上传 JSON<input type="file" id="fileInput" accept=".json"></button>
      <button class="btn-download" id="btnDownload">💾 导出 JSON</button>
    </div>
  </div>
</div>
<div class="map-wrapper">
  <div id="map"></div>
  <div class="map-stats">
    <div class="stat-num" id="statCount">0</div>
    <div class="stat-label">个足迹</div>
  </div>
  <button class="btn-overview" id="btnOverview">🔍 查看全景</button>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ===================== 默认示例数据 =====================
var sampleData = [
  {date:"2020-01-01",title:"起点",location:"北京",lat:39.9,lng:116.4,desc:"一切从这里开始。",icon:"🚀"},
  {date:"2020-06-15",title:"第一次远行",location:"成都",lat:30.57,lng:104.07,desc:"天府之国，初尝麻辣。",icon:"🌶️"},
  {date:"2021-03-20",title:"海边之旅",location:"三亚",lat:18.25,lng:109.5,desc:"碧海蓝天，椰风海韵。"},
  {date:"2021-10-01",title:"登高望远",location:"拉萨",lat:29.65,lng:91.1,desc:"布达拉宫的日光。",icon:"🏔️"},
  {date:"2022-05-01",title:"现在",location:"上海",lat:31.23,lng:121.47,desc:"在路上的感觉真好。",icon:"🌟"}
];

var journeyData = JSON.parse(JSON.stringify(sampleData));

// ===================== 初始化地图 =====================
var map = L.map("map", {
  center: [33, 112],
  zoom: 5,
  zoomControl: false,
  attributionControl: false
});
L.control.zoom({position:"bottomleft"}).addTo(map);
L.control.attribution({position:"bottomleft",prefix:false}).addTo(map);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 18,
  attribution: "&copy; OpenStreetMap"
}).addTo(map);

var markers = [];
var polyline;

// ===================== 渲染地图 =====================
function renderMap() {
  markers.forEach(function(m){m.marker.remove()});
  markers = [];
  if (polyline) polyline.remove();

  var latlngs = journeyData.map(function(e){return [e.lat, e.lng]});

  // 贝塞尔曲线轨迹
  if (latlngs.length > 1) {
    polyline = L.polyline(latlngs, {
      color: "#8b5e3c",
      weight: 3,
      opacity: 0.6,
      dashArray: "10 8",
      lineCap: "round",
      lineJoin: "round"
    }).addTo(map);

    for (var i = 0; i < latlngs.length - 1; i++) {
      (function(p1, p2) {
        var midLat = (p1[0] + p2[0]) / 2, midLng = (p1[1] + p2[1]) / 2;
        var offset = Math.min(2, 0.3 / Math.abs(p2[0] - p1[0] || 1));
        var ctrl = [midLat + offset, midLng + (Math.random() - 0.5) * 1.5];
        var pts = [];
        for (var j = 0; j <= 30; j++) {
          var t = j / 30;
          pts.push([
            (1 - t) * (1 - t) * p1[0] + 2 * (1 - t) * t * ctrl[0] + t * t * p2[0],
            (1 - t) * (1 - t) * p1[1] + 2 * (1 - t) * t * ctrl[1] + t * t * p2[1]
          ]);
        }
        L.polyline(pts, {
          color: "#b8864e",
          weight: 1.5,
          opacity: 0.3,
          dashArray: "4 8",
          interactive: false
        }).addTo(map);
      })(latlngs[i], latlngs[i + 1]);
    }
  }

  journeyData.forEach(function(event, idx) {
    var isSpecial = !!event.icon;
    var iconHtml = "<div style=\"" +
      "width:" + (isSpecial ? 38 : 28) + "px;" +
      "height:" + (isSpecial ? 38 : 28) + "px;" +
      "background:" + (isSpecial ? "#8b5e3c" : "#b8864e") + ";" +
      "border-radius:50%;" +
      "display:flex;align-items:center;justify-content:center;" +
      "font-size:" + (isSpecial ? 22 : 16) + "px;" +
      "color:#fff;" +
      "border:2px solid #fff;" +
      "box-shadow:0 2px 8px rgba(0,0,0,0.3);" +
      "transform:translate(-50%,-50%);" +
      "cursor:pointer;" +
      "\">" + (event.icon || "📍") + "</div>";

    var marker = L.marker([event.lat, event.lng], {
      icon: L.divIcon({
        html: iconHtml,
        className: "",
        iconSize: [isSpecial ? 38 : 28, isSpecial ? 38 : 28],
        iconAnchor: [isSpecial ? 19 : 14, isSpecial ? 19 : 14]
      })
    }).addTo(map);

    marker.bindPopup(
      "<div style=\"font-family:'PingFang SC','Noto Serif SC','STSong',serif;min-width:180px\">" +
      "<div style=\"font-size:18px;margin-bottom:6px\">" + (event.icon || "📍") + " " + event.title + "</div>" +
      "<div style=\"font-size:11px;color:#8b7a62;margin-bottom:2px\">📍 " + event.location + "</div>" +
      "<div style=\"font-size:11px;color:#8b7a62;margin-bottom:4px\">📅 " + event.date + "</div>" +
      "<div style=\"font-size:12px;margin-top:6px;line-height:1.6;color:#555\">" + (event.desc || "") + "</div></div>",
      {maxWidth: 260, className: "custom-popup"}
    );

    marker.on("click", function() { scrollToTimeline(idx); });
    markers.push({marker: marker, idx: idx});
  });
}

// ===================== 渲染时间轴 =====================
function renderTimeline() {
  var timelineEl = document.getElementById("timeline");
  timelineEl.innerHTML = "";
  document.getElementById("statCount").textContent = journeyData.length;

  journeyData.forEach(function(event, idx) {
    var div = document.createElement("div");
    div.className = "timeline-item";
    div.dataset.index = idx;
    div.innerHTML =
      "<div class=\"timeline-date\">" + event.date + "</div>" +
      "<div class=\"timeline-title\">" + (event.icon ? event.icon + " " : "") + event.title + "</div>" +
      "<div class=\"timeline-location\">📍 " + event.location + "</div>";
    div.addEventListener("click", function() { focusEvent(idx); });
    timelineEl.appendChild(div);
  });
}

// ===================== 交互 =====================
var activeIdx = -1;

function focusEvent(idx) {
  if (activeIdx === idx) { activeIdx = -1; resetHighlight(); fitAllBounds(); return; }
  activeIdx = idx;
  document.querySelectorAll(".timeline-item").forEach(function(el, i) { el.classList.toggle("active", i === idx); });
  map.flyTo([journeyData[idx].lat, journeyData[idx].lng], 10, { duration: 1 });
  scrollToTimeline(idx);
}

function scrollToTimeline(idx) {
  var items = document.querySelectorAll(".timeline-item");
  if (items[idx]) items[idx].scrollIntoView({ behavior: "smooth", block: "center" });
}

function resetHighlight() {
  document.querySelectorAll(".timeline-item").forEach(function(el) { el.classList.remove("active"); });
}

function fitAllBounds() {
  var coords = journeyData.map(function(e) { return [e.lat, e.lng]; });
  if (coords.length > 0) map.flyToBounds(L.latLngBounds(coords).pad(0.15), { duration: 1 });
}

document.getElementById("btnOverview").addEventListener("click", function() {
  activeIdx = -1; resetHighlight(); fitAllBounds();
});

// ===================== 编辑器 =====================
var editor = document.getElementById("editor");
var sidebar = document.getElementById("sidebar");
var btnEdit = document.getElementById("btnEdit");
var editing = false;

btnEdit.addEventListener("click", function() {
  editing = !editing;
  if (editing) {
    sidebar.classList.add("editing");
    btnEdit.textContent = "✎ 返回视图";
    editor.value = JSON.stringify(journeyData, null, 2);
  } else {
    sidebar.classList.remove("editing");
    btnEdit.textContent = "✎ 编辑数据";
  }
});

document.getElementById("btnCancel").addEventListener("click", function() {
  editing = false;
  sidebar.classList.remove("editing");
  btnEdit.textContent = "✎ 编辑数据";
});

document.getElementById("btnApply").addEventListener("click", function() {
  try {
    var data = JSON.parse(editor.value);
    if (!Array.isArray(data)) throw new Error("数据必须是数组");
    data.forEach(function(item, i) {
      if (!item.date || !item.title || !item.location) throw new Error("第" + (i+1) + "项缺少必填字段(date/title/location)");
      if (typeof item.lat !== "number" || typeof item.lng !== "number") throw new Error("第" + (i+1) + "项缺少有效经纬度(lat/lng)");
    });
    journeyData = data;
    activeIdx = -1;
    renderMap();
    renderTimeline();
    fitAllBounds();
    editing = false;
    sidebar.classList.remove("editing");
    btnEdit.textContent = "✎ 编辑数据";
  } catch(e) {
    alert("JSON 格式错误：" + e.message);
  }
});

document.getElementById("btnSample").addEventListener("click", function() {
  editor.value = JSON.stringify(sampleData, null, 2);
});

document.getElementById("fileInput").addEventListener("change", function(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    editor.value = ev.target.result;
  };
  reader.readAsText(file);
});

document.getElementById("btnDownload").addEventListener("click", function() {
  var blob = new Blob([JSON.stringify(journeyData, null, 2)], {type: "application/json"});
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url;
  a.download = "journey-data.json";
  a.click();
  URL.revokeObjectURL(url);
});

// 启动
renderMap();
renderTimeline();
fitAllBounds();
console.log("🧭 自定义历程已就绪！" + journeyData.length + " 个足迹。");
</script>
</body>
</html>
